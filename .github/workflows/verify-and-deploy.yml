name: Verify and deploy
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22.18.0
          cache: npm
      - run: npm ci
      - name: 预生成黄金样本重验证据
        continue-on-error: true
        run: npm run verify:golden-release
      - name: 预生成公开权利证据
        continue-on-error: true
        run: npm run verify:release-rights
      - run: npm run check:engineering
      - name: 归档发布门禁证据
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-gate-evidence-${{ github.run_id }}
          path: dist/release-gates
          if-no-files-found: warn
      - name: 供应链漏洞审计
        run: npm audit --audit-level=moderate
      - name: 安装 PR 快速矩阵浏览器
        if: github.event_name == 'pull_request'
        run: npx playwright install --with-deps chromium webkit
      - name: PR 跨浏览器快速验收
        if: github.event_name == 'pull_request'
        run: npm run test:e2e:pr
      - name: 安装正式发布全矩阵浏览器
        if: github.event_name != 'pull_request'
        run: npx playwright install --with-deps chromium firefox webkit
      - name: 正式发布跨浏览器、移动端及无障碍验收
        if: github.event_name != 'pull_request'
        run: npm run test:e2e
      - name: 生成并验证工程准备度证据
        if: github.event_name != 'pull_request'
        run: npm run verify:engineering-readiness
      - name: 归档单测、E2E、截图与trace证据
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-evidence-${{ github.run_id }}
          path: |
            dist/test-evidence
            playwright-report
            test-results
          if-no-files-found: warn
      - name: 验证受信生成产物未漂移
        run: git diff --exit-code -- docs/site data/imported data/review
      - name: 准备 Pages 产物
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/site
  publication-rights:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22.18.0
          cache: npm
      - run: npm ci
      - name: 公开发布真人审核硬门禁
        run: npm run verify:golden-release
      - name: 公开发布权利硬门禁
        if: always()
        run: npm run verify:release-rights
      - name: 归档发布门禁证据
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: publication-rights-${{ github.run_id }}
          path: |
            dist/release-gates/golden.json
            dist/release-gates/rights.json
          if-no-files-found: error
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [verify, publication-rights]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
